services:
  rk3588-build:
    build:
      context: .
      dockerfile: Dockerfile
      target: rk3588-build
    image: rk3588-build:latest
    environment:
      BOARD: ${BOARD:-}
      ROOTFS: ${ROOTFS:-}
      DEBIAN_RELEASE: ${DEBIAN_RELEASE:-13}
      ROOTFS_USERNAME: ${ROOTFS_USERNAME:-user}
      ROOTFS_PASSWORD: ${ROOTFS_PASSWORD:-password}
      ROOTFS_HOSTNAME: ${ROOTFS_HOSTNAME:-}
      DEBIAN_PACKAGES: ${DEBIAN_PACKAGES:-}
      DEBIAN_FEATURES: ${DEBIAN_FEATURES:-}
      DEBIAN_OVERLAYS: ${DEBIAN_OVERLAYS:-}
      DEBIAN_EXTRA_PACKAGES: ${DEBIAN_EXTRA_PACKAGES:-}
      WIFIBT_CHIP: ${WIFIBT_CHIP:-}
      WIFIBT_SOURCE: ${WIFIBT_SOURCE:-}
      WIFIBT_REQUIRED: ${WIFIBT_REQUIRED:-}
      DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://deb.debian.org/debian}
      DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://security.debian.org/debian-security}
      DEBIAN_ALLOW_ARCHIVE_FALLBACK: ${DEBIAN_ALLOW_ARCHIVE_FALLBACK:-yes}
      MANIFEST: ${MANIFEST:-}
      SDK_VOLUME: ${SDK_VOLUME:?SDK_VOLUME is required}
      FETCH_ON_START: ${FETCH_ON_START:-no}
      JOBS: ${JOBS:-0}
      DEPTH: ${DEPTH:-1}
      EXTRA_COMPONENTS: ${EXTRA_COMPONENTS:-no}
      CUSTOM_MANIFEST_URL: ${CUSTOM_MANIFEST_URL:-}
      CUSTOM_MANIFEST_NAME: ${CUSTOM_MANIFEST_NAME:-}
      CCACHE_DIR: /home/builder/.ccache
      CCACHE_MAXSIZE: ${CCACHE_MAXSIZE:-10G}
      USE_NATIVE_BUILD: ${USE_NATIVE_BUILD:-no}
      ZSTD_LEVEL: ${ZSTD_LEVEL:-6}
    volumes:
      - sdk:/home/builder/sdk
      - rk3588-ccache:/home/builder/.ccache
      - ./scripts:/home/builder/scripts:ro
      - ./manifests:/home/builder/manifests:ro
      - ./patches:/home/builder/patches:ro
      - ./configs:/home/builder/configs:ro
      - ./rootfs:/home/builder/rootfs:ro
      - ./assets:/home/builder/assets:ro
      - ./output:/home/builder/output
    init: true
    stdin_open: true
    tty: true

  debian-rootfs:
    build:
      context: .
      dockerfile: Dockerfile
      target: debian-rootfs
    image: rk3588-debian-rootfs:latest
    platform: linux/arm64
    privileged: true
    environment:
      BOARD: ${BOARD:-}
      ROOTFS: debian
      DEBIAN_RELEASE: ${DEBIAN_RELEASE:-13}
      ROOTFS_USERNAME: ${ROOTFS_USERNAME:-user}
      ROOTFS_PASSWORD: ${ROOTFS_PASSWORD:-password}
      ROOTFS_HOSTNAME: ${ROOTFS_HOSTNAME:-}
      DEBIAN_PACKAGES: ${DEBIAN_PACKAGES:-}
      DEBIAN_FEATURES: ${DEBIAN_FEATURES:-}
      DEBIAN_OVERLAYS: ${DEBIAN_OVERLAYS:-}
      DEBIAN_EXTRA_PACKAGES: ${DEBIAN_EXTRA_PACKAGES:-}
      WIFIBT_CHIP: ${WIFIBT_CHIP:-}
      WIFIBT_SOURCE: ${WIFIBT_SOURCE:-}
      WIFIBT_REQUIRED: ${WIFIBT_REQUIRED:-}
      DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://deb.debian.org/debian}
      DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://security.debian.org/debian-security}
      DEBIAN_ALLOW_ARCHIVE_FALLBACK: ${DEBIAN_ALLOW_ARCHIVE_FALLBACK:-yes}
    volumes:
      - sdk:/home/builder/sdk
      - sbc-apt-cache:/var/cache/apt/archives
      - ./scripts:/home/builder/scripts:ro
      - ./manifests:/home/builder/manifests:ro
      - ./configs:/home/builder/configs:ro
      - ./rootfs:/home/builder/rootfs:ro
      - ./assets:/home/builder/assets:ro
      - ./output:/home/builder/output
    init: true
    stdin_open: true
    tty: true

volumes:
  sdk:
    external: true
    name: ${SDK_VOLUME}
  rk3588-ccache:
    name: rk3588-ccache
  sbc-apt-cache:
    name: sbc-apt-cache
