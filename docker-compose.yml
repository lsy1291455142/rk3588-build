# =============================================================================
# RK3588 Docker зј–иҜ‘зҺҜеўғ - Compose й…ҚзҪ® (ж”ҜжҢҒ x86_64 / ARM64)
# =============================================================================

services:
  rk3588-build:
    build:
      context: .
      dockerfile: Dockerfile
    image: rk3588-build:latest
    container_name: rk3588-build
    platform: ${DOCKER_PLATFORM:-linux/amd64}

    # ---- зҺҜеўғеҸҳйҮҸ ----
    environment:
      - BSP_SOURCE=${BSP_SOURCE:-rockchip}
      - BRANCH=${BRANCH:-stable-5.10}
      - FETCH_ON_START=${FETCH_ON_START:-no}
      - JOBS=${JOBS:-0}
      - DEPTH=${DEPTH:-1}
      - EXTRA_COMPONENTS=${EXTRA_COMPONENTS:-no}
      - CUSTOM_MANIFEST_URL=${CUSTOM_MANIFEST_URL:-}
      - CUSTOM_MANIFEST_NAME=${CUSTOM_MANIFEST_NAME:-default.xml}
      - CCACHE_DIR=/home/builder/.ccache
      - CCACHE_MAXSIZE=${CCACHE_MAXSIZE:-10G}
      # ARM64 е®ҝдё»жңәеҸҜйҖү: дҪҝз”ЁеҺҹз”ҹзј–иҜ‘еҠ йҖҹ
      - USE_NATIVE_BUILD=${USE_NATIVE_BUILD:-no}

    # ---- еҚ·жҢӮиҪҪ ----
    volumes:
      - rk3588-sdk:/home/builder/sdk
      - rk3588-ccache:/home/builder/.ccache
      - ./patches:/home/builder/patches:ro
      - ./configs:/home/builder/configs:ro

    # ---- иө„жәҗйҷҗеҲ¶ ----
    deploy:
      resources:
        limits:
          cpus: ${DOCKER_CPUS:-8}
          memory: ${DOCKER_MEMORY:-16G}

    # ---- зҪ‘з»ң ----
    network_mode: bridge

    # ---- дәӨдә’ејҸ ----
    stdin_open: true
    tty: true

volumes:
  rk3588-sdk:
    name: rk3588-sdk
  rk3588-ccache:
    name: rk3588-ccache
