# =============================================================================
# RK3588 SoC 特性 / RK3588 SoC Traits
# =============================================================================
# 平台级事实（与具体板子无关），由板子 conf 通过 SOC= 选择后加载。
# Platform-level facts (board-independent), loaded when a board profile sets SOC=.
#
# 这些特性目前只被 QEMU 'virt' 冒烟测试使用（见 scripts/lib/qemu_smoke.py）。
# These traits are currently consumed only by the QEMU 'virt' smoke test.

# 在 QEMU 'virt' 机器上没有真实的 ATF/EL3，Rockchip SiP SMC 调用（例如 DMA
# system heap init 发出的 sip_smc_get_dram_map）会被当成未定义指令并导致内核
# BUG。把这些 initcall 加入黑名单，内核才能挂载到根文件系统。这仅是 QEMU
# 平台的限制；真实的 RK3588 硬件不受影响。
# Under QEMU 'virt' there is no real ATF/EL3, so Rockchip SiP SMC calls trap as
# undefined instructions and BUG the kernel. Blacklist the offending initcalls
# so the kernel can reach root mount. QEMU-platform limitation only.
QEMU_INITCALL_BLACKLIST="rockchip_drm_init,rockchip_cpufreq_driver_init,rga_init,regulatory_init_db,system_heap_create"

# RK3588 使用 FiQ 串口控制台；在 QEMU 下该 UART 未被建模，屏蔽通用 ttyFIQ0
# getty 以免开机卡在登录。
# RK3588 uses the FiQ serial console; under QEMU that UART is unmodelled, so
# mask the generic ttyFIQ0 getty to avoid a stuck login prompt.
QEMU_SERIAL_GETTY_MASK="serial-getty@ttyFIQ0.service"
