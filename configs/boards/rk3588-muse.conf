BOARD_DESCRIPTION="MUSE RK3588 (eMMC boot, LPDDR4X, RK806 single + RK860x)"
# Companion manifest (not pinned): manifests/rk3588-muse-5.10.xml via make fetch-muse
#
# Hardware confirmed:
# - LPDDR4X
# - RK806 single + RK8602 (VDD_CPU_BIG0 @ I2C0-M2 0x42,
#   VDD_NPU @ I2C1-M2 0x42) + RK8603 (VDD_CPU_BIG1 @ I2C0-M2 0x43)
# - Debug UART2_M0 (1.8V), console ttyFIQ0 @ 1500000
# - kernel DTB: rk3588-muse.dtb from MUSEInstitute/kernel develop-5.10
#
# DDR note: loader DRAM init comes from rkbin via u-boot make.sh, not DTS.
# After fetch-muse, verify rkbin uses an LP4X-capable DDR blob
# (filename may still contain lp4; Rockchip often ships combined LP4/LP4X bins).
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3588-muse.dtb"

UBOOT_DEFCONFIG="rk3588_defconfig"
UBOOT_BOARD="rk3588"
UBOOT_BUILD_SYSTEM="rockchip-make-sh"
UBOOT_PYTHON="python3"

BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"
DOWNLOAD_LOADER_GLOBS="rk3588*loader*.bin;MiniLoaderAll.bin"
UBOOT_IMAGE_NAMES="uboot.img;u-boot.img"
IDBLOCK_SECTOR=64
UBOOT_SECTOR=16384

# Same GPT layout for SD or eMMC; root is found by PARTLABEL=rootfs.
CONSOLE="ttyFIQ0,1500000n8"
EXTRA_KERNEL_ARGS="earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0"

IMAGE_SIZE_MIB=4096
BOOT_START_MIB=16
BOOT_SIZE_MIB=256
ROOTFS_SIZE_MIB=2048
