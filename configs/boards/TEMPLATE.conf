# =============================================================================
# 开发板配置文件模板 / Board Configuration Template
# =============================================================================
# 复制此文件为 <board-name>.conf 并填入对应开发板的参数值。
# Copy this file to <board-name>.conf and fill in the values for your board.
# 必填字段带有 [REQUIRED] 标记，可选字段展示了默认值或被注释掉。
# Required fields are marked with [REQUIRED]. Optional fields show defaults.
#
# 使用方法 / Usage:
#   make new-board BOARD=my-board
#   # 编辑 configs/boards/my-board.conf / Edit my-board.conf
#   make validate-board BOARD=my-board
#   make build-all BOARD=my-board ROOTFS=debian
# =============================================================================

# ---------------------------------------------------------------------------
# 开发板标识 / Board Identity
# ---------------------------------------------------------------------------

# [REQUIRED] 开发板的可读描述信息 / Human-readable description of the board
# 示例 / Example: "Radxa Rock 5C (RK3588S)"
BOARD_DESCRIPTION=""

# ---------------------------------------------------------------------------
# 源码 Manifest 配置（可选，用于代码拉取与 Commit 锁定）
# Source Manifest (Optional, for repo fetch & revision pinning)
# ---------------------------------------------------------------------------

# manifests/ 目录下的 Manifest XML 文件名，用于 Google repo 拉取源码。
# Manifest file under manifests/ for fetching SDK sources via Google repo.
# 如果使用 `make import-local-sdk` 导入本地 SDK，此处可留空。
# Leave empty if you import the SDK manually with `make import-local-sdk`.
# 示例 / Example: rk3588-rock5c.xml
#SOURCE_MANIFEST=""

# 当设置了 SOURCE_MANIFEST 时，需要填写以下 40 位完整的 Git Commit SHA 校验值。
# When SOURCE_MANIFEST is set, these full Git commit SHAs are required.
#EXPECTED_KERNEL_REVISION=""
#EXPECTED_UBOOT_REVISION=""
#EXPECTED_RKBIN_REVISION=""
#EXPECTED_BUILDROOT_REVISION=""

# ---------------------------------------------------------------------------
# 内核配置 / Kernel Configuration
# ---------------------------------------------------------------------------

# [REQUIRED] 内核 defconfig 配置文件名（位于 arch/arm64/configs/ 目录下）
# [REQUIRED] Kernel defconfig name (under arch/arm64/configs/)
# 示例 / Example: rockchip_linux_defconfig
KERNEL_DEFCONFIG=""

# [REQUIRED] 设备树二进制文件名（必须以 .dtb 结尾）
# [REQUIRED] Device Tree Blob filename (must end in .dtb)
# 示例 / Example: rk3588s-rock-5c.dtb
KERNEL_DTB=""

# 设备树插件文件名（空格分隔的 .dtbo 文件列表，用于 extlinux FDTOVERLAYS 加载）
# Device Tree Overlay filenames (space-separated .dtbo files) to load via extlinux FDTOVERLAYS
# 示例 / Example: "rk3588-uart0-m0.dtbo rk3588-spi3-m1.dtbo"
#KERNEL_DTBO=""

# 额外需要合并的内核配置 Fragment 路径（相对项目根目录，空格分隔）
# Additional kernel config fragments to merge (space-separated relative paths)
# 示例 / Example: "configs/kernel/extra.config"
#KERNEL_EXTRA_FRAGMENTS=""

# 是否在打包前从编译出的 DTB 中剥离 /chosen/bootargs（默认: yes）
# Whether to strip /chosen/bootargs from the compiled DTB before packaging (default: yes)
#DTB_STRIP_BOOTARGS="yes"

# ---------------------------------------------------------------------------
# U-Boot 引导程序配置 / U-Boot Configuration
# ---------------------------------------------------------------------------

# [REQUIRED] U-Boot defconfig 配置文件名（位于 configs/ 目录下）
# [REQUIRED] U-Boot defconfig name (under configs/)
# 示例 / Example: rock-5c-rk3588s_defconfig
UBOOT_DEFCONFIG=""

# [REQUIRED] 芯片厂商构建系统使用的 U-Boot 板级标识符
# [REQUIRED] U-Boot board identifier used by the build system
# 示例 / Example: rock-5c-rk3588s
UBOOT_BOARD=""

# 使用的 U-Boot 构建系统类型（默认: rockchip-make-sh）
# U-Boot build system to use (default: rockchip-make-sh)
#UBOOT_BUILD_SYSTEM="rockchip-make-sh"

# U-Boot FIT 镜像生成器使用的 Python 版本（默认: python3）
# Python version for U-Boot FIT image generator (default: python3)
#UBOOT_PYTHON="python3"

# ---------------------------------------------------------------------------
# 启动链布局 / Bootloader Layout
# ---------------------------------------------------------------------------

# 引导链与磁盘分区布局策略（默认: rockchip-gpt-idblock-extlinux-v1）
# Boot chain layout strategy (default: rockchip-gpt-idblock-extlinux-v1)
#BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"

# 查找 Download Loader 引导文件的匹配模式（分号分隔，不填默认自动查找 rk3588*loader*.bin;MiniLoaderAll.bin）
# Glob patterns (semicolon-separated) to find download loader (default: rk3588*loader*.bin;MiniLoaderAll.bin)
#DOWNLOAD_LOADER_GLOBS="rk3588*loader*.bin;MiniLoaderAll.bin"

# U-Boot 镜像文件名匹配模式（分号分隔，不填默认自动查找 uboot.img;u-boot.img）
# Possible names for U-Boot image (default: uboot.img;u-boot.img)
#UBOOT_IMAGE_NAMES="uboot.img;u-boot.img"

# GPT 镜像中 IDBlock 的扇区偏移量（不填默认: 64）
# Sector offset for IDBlock in GPT image (default: 64)
#IDBLOCK_SECTOR=64

# GPT 镜像中 U-Boot 镜像的扇区偏移量（不填默认: 16384）
# Sector offset for U-Boot image in GPT image (default: 16384)
#UBOOT_SECTOR=16384

# ---------------------------------------------------------------------------
# 控制台与启动参数 / Console & Boot Arguments
# ---------------------------------------------------------------------------

# [REQUIRED] 串口控制台配置（用于内核和 extlinux.conf）
# [REQUIRED] Serial console specification for kernel and extlinux.conf
# 格式 / Format: <device>,<baud><parity><bits>
# 示例 / Example: ttyFIQ0,1500000n8
CONSOLE=""

# 追加到 extlinux.conf APPEND 行的额外内核命令行参数
# Additional kernel command-line arguments appended to extlinux.conf APPEND line
# 示例 / Example: "earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0"
#EXTRA_KERNEL_ARGS=""

# ---------------------------------------------------------------------------
# 磁盘分区几何布局 / Disk Image Layout
# ---------------------------------------------------------------------------

# 磁盘镜像总大小（单位：MiB，不填默认: 2048，即 2GB）
# Total disk image size in MiB (default: 2048)
#IMAGE_SIZE_MIB=2048

# Boot 分区起始位置（单位：MiB，必须 >= 16 以保留 IDBlock/U-Boot 空间，默认: 16）
# Start of the boot partition in MiB (must be >= 16, default: 16)
#BOOT_START_MIB=16

# Boot 分区大小（单位：MiB，FAT32 格式，包含内核、DTB 及 extlinux.conf，默认: 256）
# Boot partition size in MiB (FAT32, contains kernel + DTB + extlinux, default: 256)
#BOOT_SIZE_MIB=256

# Rootfs 根文件系统分区初始大小（单位：MiB，不填默认: 1700）
# Root filesystem partition size in MiB (default: 1700)
#ROOTFS_SIZE_MIB=1700

# ---------------------------------------------------------------------------
# 输出命名与 Extlinux 标签 / Output Naming & Extlinux Label
# ---------------------------------------------------------------------------

# 输出镜像文件名的前缀（如果不设置，默认使用 BOARD 名称）
# Prefix for output image filenames. Defaults to the BOARD name if not set.
# 示例 / Example: "rock-5c" -> "rock-5c-debian-13.img.zst"
#OUTPUT_IMAGE_PREFIX=""

# extlinux.conf 中启动条目的标签名称（默认使用 BOARD 名称）
# Label name used in extlinux.conf for the boot entry (default: BOARD name)
#EXTLINUX_LABEL=""

# ---------------------------------------------------------------------------
# Debian 根文件系统默认配置 / Debian Rootfs Defaults
# ---------------------------------------------------------------------------

# 根文件系统默认主机名（如果为空，默认回退使用 BOARD 名称）
# Default hostname for the rootfs. If empty, falls back to the BOARD name.
#ROOTFS_HOSTNAME_DEFAULT=""

# 默认额外 APT 软件包（空格或逗号分隔的真实包名，无 feature 别名）
# Extra APT packages only (real package names; no feature aliases).
# 示例 / Example: "network-manager,wpasupplicant,htop,i2c-tools"
#DEBIAN_PACKAGES_DEFAULT=""

# 命令行追加的额外 APT 包（在默认包列表基础上追加）
# Additional APT packages to append (appended to DEBIAN_PACKAGES_DEFAULT)
#DEBIAN_EXTRA_PACKAGES=""

# 默认启用的可选 overlay 插件（逗号分隔；none 关闭；all 全部）
# Optional overlay plugins (comma-separated; none disables; all enables every plugin).
# Built-ins: base,console,firstboot,firstboot-info,network
# 示例 / Example: "base,console,firstboot,network"
#DEBIAN_OVERLAYS_DEFAULT="base,console,firstboot,firstboot-info,network"

# Board-local files (always applied when present; not selected via DEBIAN_OVERLAYS):
#   rootfs/debian/boards/<BOARD>/overlay/
# Example: CokePi AIC firmware under
#   rootfs/debian/boards/rk3588s-cokepi-model-lp4-v10/
