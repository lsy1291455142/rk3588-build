# =============================================================================
# Board Configuration Template
# =============================================================================
# Copy this file to <board-name>.conf and fill in the values for your board.
# Required fields are marked with [REQUIRED]. Optional fields show defaults.
#
# Usage:
#   cp TEMPLATE.conf my-board.conf
#   # Edit my-board.conf with your board's values
#   make validate-board BOARD=my-board
#   make build-all BOARD=my-board SDK_VOLUME=<your-sdk-volume> ROOTFS=debian
# =============================================================================

# ---------------------------------------------------------------------------
# Board Identity
# ---------------------------------------------------------------------------

# [REQUIRED] Human-readable description of the board
# Example: "Radxa Rock 5C (RK3588S)"
BOARD_DESCRIPTION=""

# ---------------------------------------------------------------------------
# Source Manifest (optional, for fetch & revision pinning)
# ---------------------------------------------------------------------------

# Manifest file under manifests/ for fetching SDK sources via Google repo.
# Leave empty if you import the SDK manually with `make import-local-sdk`.
# Example: rk3588-rock5c.xml
#SOURCE_MANIFEST=""

# When SOURCE_MANIFEST is set, these full Git commit SHAs are required.
# They pin the exact SDK component revisions and are verified before builds.
#EXPECTED_KERNEL_REVISION=""
#EXPECTED_UBOOT_REVISION=""
#EXPECTED_RKBIN_REVISION=""
#EXPECTED_BUILDROOT_REVISION=""

# ---------------------------------------------------------------------------
# Kernel Configuration
# ---------------------------------------------------------------------------

# [REQUIRED] Kernel defconfig name (under arch/arm64/configs/)
# Example: rockchip_linux_defconfig
KERNEL_DEFCONFIG=""

# [REQUIRED] Device Tree Blob filename (must end in .dtb)
# Example: rk3588s-rock-5c.dtb
KERNEL_DTB=""

# Device Tree Overlay filenames (space-separated .dtbo files) to load via extlinux FDTOVERLAYS
# Example: "rk3588-uart0-m0.dtbo rk3588-spi3-m1.dtbo"
#KERNEL_DTBO=""

# Additional kernel config fragments to merge (space-separated paths relative
# to the project root). The base fragment configs/kernel/rootfs-base.config
# is always merged automatically.
#KERNEL_EXTRA_FRAGMENTS=""

# ---------------------------------------------------------------------------
# U-Boot Configuration
# ---------------------------------------------------------------------------

# [REQUIRED] U-Boot defconfig name (under configs/)
# Example: rock-5c-rk3588s_defconfig
UBOOT_DEFCONFIG=""

# [REQUIRED] U-Boot board identifier used by the Rockchip build system
# Example: rock-5c-rk3588s
UBOOT_BOARD=""

# [REQUIRED] U-Boot build system to use
# Supported values: rockchip-make-sh
UBOOT_BUILD_SYSTEM="rockchip-make-sh"

# [REQUIRED] Python version for U-Boot FIT image generator
# Supported values: python2, python3
# Most boards use python3. Some older Rockchip SDKs require python2.
UBOOT_PYTHON="python3"

# ---------------------------------------------------------------------------
# Bootloader Layout
# ---------------------------------------------------------------------------

# [REQUIRED] Boot chain layout strategy
# Supported values: rockchip-gpt-idblock-extlinux-v1
# This determines how the bootloader components are written to the disk image
# and how they are verified.
BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"

# [REQUIRED] Glob patterns (semicolon-separated) to find the download loader
# binary in the U-Boot build output.
# Example: "rk3588*loader*.bin;MiniLoaderAll.bin"
DOWNLOAD_LOADER_GLOBS=""

# [REQUIRED] Possible names for the U-Boot image (semicolon-separated)
# Example: "uboot.img;u-boot.img"
UBOOT_IMAGE_NAMES=""

# [REQUIRED] Sector offset for the IDBlock (RKNS format) in the GPT image.
# Must be >= 34 (after GPT header) and < UBOOT_SECTOR.
# Standard Rockchip value: 64
IDBLOCK_SECTOR=64

# [REQUIRED] Sector offset for the U-Boot image in the GPT image.
# Must be > IDBLOCK_SECTOR and < boot partition start.
# Standard Rockchip value: 16384
UBOOT_SECTOR=16384

# ---------------------------------------------------------------------------
# Console & Boot Arguments
# ---------------------------------------------------------------------------

# [REQUIRED] Serial console specification for kernel and extlinux.conf
# Format: <device>,<baud><parity><bits>
# Example: ttyFIQ0,1500000n8  (Rockchip FIQ debug UART)
# Example: ttyS2,1500000n8    (standard serial)
CONSOLE=""

# Additional kernel command-line arguments appended to extlinux.conf APPEND line
# Example: "earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0"
#EXTRA_KERNEL_ARGS=""

# ---------------------------------------------------------------------------
# DTB Processing Options
# ---------------------------------------------------------------------------

# Whether to strip /chosen/bootargs from the compiled DTB before packaging.
# Rockchip U-Boot merges DTB /chosen/bootargs after extlinux APPEND and can
# override critical parameters like root=. Set to "yes" to keep extlinux
# authoritative (recommended for Rockchip boards).
# Default: yes
#DTB_STRIP_BOOTARGS="yes"

# ---------------------------------------------------------------------------
# Disk Image Layout
# ---------------------------------------------------------------------------

# [REQUIRED] Total disk image size in MiB
# Example: 4096
IMAGE_SIZE_MIB=4096

# [REQUIRED] Start of the boot partition in MiB (must be >= 16 to reserve
# space for IDBlock and U-Boot)
# Example: 16
BOOT_START_MIB=16

# [REQUIRED] Boot partition size in MiB (FAT32, contains kernel + DTB + extlinux)
# Example: 256
BOOT_SIZE_MIB=256

# [REQUIRED] Root filesystem partition size in MiB
# Must fit within IMAGE_SIZE_MIB after boot partition.
# Example: 2048
ROOTFS_SIZE_MIB=2048

# ---------------------------------------------------------------------------
# Output Naming
# ---------------------------------------------------------------------------

# Prefix for output image filenames. Defaults to the BOARD name if not set.
# Example: "rock-5c" would produce "rock-5c-debian-13.img.zst"
#OUTPUT_IMAGE_PREFIX=""

# ---------------------------------------------------------------------------
# Debian Rootfs Defaults (can be overridden via environment/CLI)
# ---------------------------------------------------------------------------

# Default hostname for the rootfs. If empty, falls back to the BOARD name.
#ROOTFS_HOSTNAME_DEFAULT=""

# Default Debian packages and features (space or comma-separated tokens).
# Can include feature keywords (nm, hwdebug, tools, firstboot-info, wifibt, all)
# AND/OR direct APT package names (htop, nginx, docker.io, python3-pip).
# Example: "nm hwdebug htop nginx docker.io"
#DEBIAN_PACKAGES_DEFAULT=""

# ---------------------------------------------------------------------------
# WiFi/Bluetooth Firmware
# ---------------------------------------------------------------------------

# WiFi/BT chip identifier for firmware installation.
# Examples: AP6275S, AIC8800D80, ALL_AP, ALL, none
# Set to "none" or leave empty to skip WiFi/BT firmware.
#WIFIBT_CHIP="none"

# WiFi/BT firmware symlink style. Controls how firmware paths are set up
# in the rootfs for driver compatibility.
# Supported values:
#   rockchip-vendor  - Creates /vendor -> /system and /system/etc/firmware -> /lib/firmware
#                      (required for Rockchip bcmdhd and AIC drivers)
#   none             - No special symlinks (firmware lives directly in /lib/firmware)
# Default: rockchip-vendor (when WIFIBT_CHIP is not "none")
#WIFIBT_FIRMWARE_SYMLINKS="rockchip-vendor"

# ---------------------------------------------------------------------------
# Extlinux.conf Label
# ---------------------------------------------------------------------------

# Label name used in extlinux.conf for the boot entry.
# Default: the BOARD name
#EXTLINUX_LABEL=""
