# =============================================================================
# 开发板配置文件 / Board Configuration: Radxa Rock 5C (RK3588S)
# =============================================================================

# ---------------------------------------------------------------------------
# 开发板标识 / Board Identity
# ---------------------------------------------------------------------------
BOARD_DESCRIPTION="Radxa Rock 5C (RK3588S)"

# ---------------------------------------------------------------------------
# 源码 Manifest 配置 / Source Manifest
# ---------------------------------------------------------------------------
SOURCE_MANIFEST="rk3588-rock5c.xml"
EXPECTED_KERNEL_REVISION="567401fe17185f0f4a65866158b775a364feb2d3"
EXPECTED_UBOOT_REVISION="4218b05a597f458947f0f4706063b3bb8196e07c"
EXPECTED_RKBIN_REVISION="ecb4fcbe954edf38b3ae037d5de6d9f5bccf81f4"
EXPECTED_BUILDROOT_REVISION="c49ae7216786d3cb62a8e8de5556007b4b539233"

# ---------------------------------------------------------------------------
# 内核配置 / Kernel Configuration
# ---------------------------------------------------------------------------
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3588s-rock-5c.dtb"

# ---------------------------------------------------------------------------
# U-Boot 引导程序配置 / U-Boot Configuration
# ---------------------------------------------------------------------------
UBOOT_DEFCONFIG="rock-5c-rk3588s_defconfig"
UBOOT_BOARD="rock-5c-rk3588s"
UBOOT_BUILD_SYSTEM="rockchip-make-sh"
UBOOT_PYTHON="python3"

# ---------------------------------------------------------------------------
# 启动链布局 / Bootloader Layout
# ---------------------------------------------------------------------------
BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"
DOWNLOAD_LOADER_GLOBS="rk3588*loader*.bin;MiniLoaderAll.bin"
UBOOT_IMAGE_NAMES="uboot.img;u-boot.img"
IDBLOCK_SECTOR=64
UBOOT_SECTOR=16384

# ---------------------------------------------------------------------------
# 控制台与启动参数 / Console & Boot Arguments
# ---------------------------------------------------------------------------
CONSOLE="ttyFIQ0,1500000n8"
EXTRA_KERNEL_ARGS="earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0"

# ---------------------------------------------------------------------------
# 磁盘分区几何布局 / Disk Image Layout
# ---------------------------------------------------------------------------
IMAGE_SIZE_MIB=2048
BOOT_START_MIB=16
BOOT_SIZE_MIB=256
ROOTFS_SIZE_MIB=1700
