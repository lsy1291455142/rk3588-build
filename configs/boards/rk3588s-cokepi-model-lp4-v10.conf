# =============================================================================
# 开发板配置文件 / Board Configuration: CokePi Model LP4 V1.0 (RK3588S)
# =============================================================================

# ---------------------------------------------------------------------------
# 开发板标识 / Board Identity
# ---------------------------------------------------------------------------
BOARD_DESCRIPTION="CokePi Model LP4 V1.0 (RK3588S)"


# ---------------------------------------------------------------------------
# 源码 Manifest 配置 / Source Manifest
# ---------------------------------------------------------------------------
# CokePi SDK is not public. Leave SOURCE_MANIFEST unset and import a local tree:
#   make import-local-sdk SDK_PATH=/path/to/cokepi-sdk SDK_VOLUME=rk3588-sdk-cokepi-rkr9
#SOURCE_MANIFEST=""

# ---------------------------------------------------------------------------
# 内核配置 / Kernel Configuration
# ---------------------------------------------------------------------------
KERNEL_DEFCONFIG="cokepi_main_defconfig"
KERNEL_DTB="rk3588s-cpm-hdmi1.dtb"

# ---------------------------------------------------------------------------
# U-Boot 引导程序配置 / U-Boot Configuration
# ---------------------------------------------------------------------------
UBOOT_DEFCONFIG="rk3588_defconfig"
UBOOT_BOARD="rk3588"
UBOOT_BUILD_SYSTEM="rockchip-make-sh"
UBOOT_PYTHON="python2"

# ---------------------------------------------------------------------------
# 启动链布局 / Bootloader Layout
# ---------------------------------------------------------------------------
BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"
DOWNLOAD_LOADER_GLOBS="rk3588*loader*.bin;MiniLoaderAll.bin"
UBOOT_IMAGE_NAMES="uboot.img;u-boot.img"
IDBLOCK_SECTOR=64
UBOOT_SECTOR=16384

# ---------------------------------------------------------------------------
# 控制台与启动参数 / Console & Boot Arguments
# ---------------------------------------------------------------------------
CONSOLE="ttyFIQ0,1500000n8"
EXTRA_KERNEL_ARGS="earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0 irqchip.gicv3_pseudo_nmi=0 rcupdate.rcu_expedited=1 rcu_nocbs=all"

# ---------------------------------------------------------------------------
# 磁盘分区几何布局 / Disk Image Layout
# ---------------------------------------------------------------------------
IMAGE_SIZE_MIB=2048
BOOT_START_MIB=16
BOOT_SIZE_MIB=256
ROOTFS_SIZE_MIB=1700

# ---------------------------------------------------------------------------
# Debian 根文件系统默认配置 / Debian Rootfs Defaults
# ---------------------------------------------------------------------------
DEBIAN_PACKAGES_DEFAULT="network-manager,wpasupplicant,i2c-tools,usbutils,pciutils,mmc-utils"
DEBIAN_OVERLAYS_DEFAULT="base,console,firstboot,firstboot-info,network"
ROOTFS_HOSTNAME_DEFAULT="cokepi"

# WiFi/BT firmware is board-local static overlay (not a plugin):
#   rootfs/debian/boards/rk3588s-cokepi-model-lp4-v10/
# Stage once:
#   ./rootfs/debian/boards/rk3588s-cokepi-model-lp4-v10/stage-aic8800-firmware.sh

