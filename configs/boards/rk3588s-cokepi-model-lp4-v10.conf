BOARD_DESCRIPTION="CokePi Model LP4 V1.0 (RK3588S)"

KERNEL_DEFCONFIG="cokepi_main_defconfig"
KERNEL_DTB="rk3588s-cpm-hdmi1.dtb"

UBOOT_DEFCONFIG="rk3588_defconfig"
UBOOT_BOARD="rk3588"
UBOOT_BUILD_SYSTEM="rockchip-make-sh"
UBOOT_PYTHON="python2"

BOOTLOADER_LAYOUT="rockchip-gpt-idblock-extlinux-v1"
DOWNLOAD_LOADER_GLOBS="rk3588*loader*.bin;MiniLoaderAll.bin"
UBOOT_IMAGE_NAMES="uboot.img;u-boot.img"
IDBLOCK_SECTOR=64
UBOOT_SECTOR=16384

CONSOLE="ttyFIQ0,1500000n8"
EXTRA_KERNEL_ARGS="earlycon=uart8250,mmio32,0xfeb50000 consoleblank=0 irqchip.gicv3_pseudo_nmi=0 rcupdate.rcu_expedited=1 rcu_nocbs=all"

IMAGE_SIZE_MIB=4096
BOOT_START_MIB=16
BOOT_SIZE_MIB=256
ROOTFS_SIZE_MIB=2048

# Debian rootfs defaults for bring-up (override with DEBIAN_FEATURES=... / ROOTFS_HOSTNAME=...)
DEBIAN_FEATURES_DEFAULT="nm,hwdebug,firstboot-info,wifibt"
ROOTFS_HOSTNAME_DEFAULT="cokepi"

# WiFi/BT firmware (feature wifibt). AIC is not in Rockchip rkwifibt; use assets.
# On-board module is AIC8800D80 (SDIO). Firmware is NOT in SDK external/rkwifibt;
# builder installs from assets/wifibt/aicsemi/AIC8800D80 (or full deb extract).
# CLI can override. WIFIBT_REQUIRED=no keeps soft-skip if assets missing.
: "${WIFIBT_CHIP:=AIC8800D80}"
: "${WIFIBT_SOURCE:=sdk-or-assets}"
: "${WIFIBT_REQUIRED:=no}"
