name: docker-rk3588-build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - Dockerfile
      - .dockerignore
      - scripts/**
      - manifests/**
      - configs/**
      - rootfs/**
      - Makefile
      - docker-compose.yml
      - .github/workflows/docker-rk3588-build.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - scripts/**
      - manifests/**
      - configs/**
      - rootfs/**
      - Makefile
      - docker-compose.yml
      - .github/workflows/docker-rk3588-build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-rk3588-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: rk3588-build
  DOCKER_TARGET: rk3588-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=rk3588-build
            org.opencontainers.image.description=RK3588 BSP builder environment (no vendor SDK)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push rk3588-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ env.DOCKER_TARGET }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### rk3588-build pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This image is the builder toolchain only. Mount a local SDK volume at runtime; do not expect board firmware inside the image." >> "$GITHUB_STEP_SUMMARY"
