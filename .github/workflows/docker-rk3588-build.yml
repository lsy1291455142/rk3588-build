name: docker-rk3588-build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - Dockerfile
      - .dockerignore
      - scripts/**
      - manifests/**
      - configs/**
      - rootfs/**
      - Makefile
      - docker-compose.yml
      - .github/workflows/docker-rk3588-build.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - scripts/**
      - manifests/**
      - configs/**
      - rootfs/**
      - Makefile
      - docker-compose.yml
      - .github/workflows/docker-rk3588-build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-rk3588-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: rk3588-build
  DOCKER_TARGET: rk3588-build
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/rk3588-build

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare
        run: |
          echo "PLATFORM_PAIR=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.title=rk3588-build
            org.opencontainers.image.description=RK3588 BSP builder environment (linux/amd64 + linux/arm64; no vendor SDK)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ env.DOCKER_TARGET }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rk3588-build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=rk3588-build-${{ env.PLATFORM_PAIR }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          test -n "$digest"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=rk3588-build
            org.opencontainers.image.description=RK3588 BSP builder environment (linux/amd64 + linux/arm64; no vendor SDK)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          set -eux
          tag_args="$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          sources="$(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)"
          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args $sources

      - name: Image summary
        run: |
          {
            echo "### rk3588-build multi-arch pushed"
            echo ""
            echo "Platforms: linux/amd64, linux/arm64"
            echo ""
            echo '```'
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Builder toolchain only. Mount a local SDK volume at runtime; board firmware is not inside the image."
            echo ""
            first_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)"
            echo "Inspect: ${first_tag}"
            echo '```'
            docker buildx imagetools inspect "$first_tag"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
